<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RecallText™ — One Transaction. All Conversations. One Verified Record.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#1A2F5A;--navy-dark:#0F1E3D;--orange:#F97316;--orange-light:#FB9A4B;--cream:#F8F4EE;--cream-dark:#EDE8DF;--text:#1A1A1A;--muted:#6B7280;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,30,61,0.97);backdrop-filter:blur(20px);padding:16px 60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(249,115,22,0.2);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:white;}.nav-logo span{color:var(--orange);}
.nav-badge{background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.35);color:var(--orange);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:100px;}
.nav-cta{background:var(--orange);color:white;padding:10px 28px;border-radius:100px;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.2s;}
.nav-cta:hover{background:var(--orange-light);transform:translateY(-1px);}
.hero{min-height:100vh;background:linear-gradient(150deg,#0a1628 0%,var(--navy) 55%,#1e3a6e 100%);display:grid;grid-template-columns:1.1fr 0.9fr;align-items:center;padding:130px 80px 80px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 70% 50%,rgba(249,115,22,0.06) 0%,transparent 70%);}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);color:var(--orange);border-radius:100px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;animation:fadeUp 0.6s ease both;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,72px);font-weight:600;line-height:1.08;color:white;letter-spacing:-0.5px;margin-bottom:24px;animation:fadeUp 0.6s ease 0.1s both;}
.hero h1 em{color:var(--orange);font-style:normal;}
.hero-sub{font-size:17px;line-height:1.75;color:rgba(255,255,255,0.68);max-width:500px;margin-bottom:44px;animation:fadeUp 0.6s ease 0.2s both;}
.hero-stats{display:flex;gap:48px;margin-bottom:48px;animation:fadeUp 0.6s ease 0.3s both;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:var(--orange);line-height:1;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp 0.6s ease 0.4s both;}
.btn-primary{background:var(--orange);color:white;padding:15px 36px;border-radius:100px;font-size:14px;font-weight:700;text-decoration:none;transition:all 0.25s;box-shadow:0 8px 32px rgba(249,115,22,0.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(249,115,22,0.45);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.8);padding:15px 36px;border-radius:100px;font-size:14px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,0.2);transition:all 0.25s;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.4);color:white;}
.hero-right{display:flex;justify-content:center;align-items:center;animation:fadeUp 0.8s ease 0.3s both;}
.doc-mockup{background:white;border-radius:18px;padding:28px;width:360px;box-shadow:0 40px 80px rgba(0,0,0,0.45);}
.doc-header{border-bottom:2px solid var(--navy);padding-bottom:14px;margin-bottom:18px;}
.doc-title{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;color:var(--navy);letter-spacing:1px;text-transform:uppercase;}
.doc-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
.doc-section-head{font-size:9px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Recall<span>Text</span></div>
  <div class="nav-badge">Verified Record</div>
  <a class="nav-cta" href="#">Book Demo</a>
</nav>

<section class="hero">
  <div>
    <div class="hero-tag">One Transaction. One Record.</div>
    <h1>Every conversation in <em>one verified record</em>.</h1>
    <p class="hero-sub">
      RecallText gives teams a single source of truth for high-stakes transactions.
    </p>
  </div>

  <div class="hero-right">
    <div class="doc-mockup">
      <div class="doc-header">
        <div class="doc-title">Verified Transaction Record</div>
        <div class="doc-sub">RecallText™</div>
      </div>

      <div class="doc-section-head">Summary</div>
      <p>This is your pitch page.</p>
    </div>
  </div>
</section>

</body>
</html>
